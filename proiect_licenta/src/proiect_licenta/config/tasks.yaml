parse_symptoms_task:
  description: >
    A patient has arrived and said: "{user_message}".

    Your job is to gather ALL of the following information for triage.
    First, extract what you can from their message. Then, for EACH missing
    piece of information, use the ask_patient tool to ask them directly.
    Ask one question at a time, and be friendly.

    Patient identifier (ask FIRST, before symptoms):
    0. Medical record number (MRN) - ask whether the patient has been treated
       at this hospital before and, if so, for their MRN (an integer). This
       lets the system pull their real prior medical history instead of relying
       on recall. If they are new, decline, or don't know, record subject_id
       as -1 (a first-time patient). Do NOT invent or guess an MRN.

    Required information:
    1. Chief complaints - what symptoms/issues brought them to the ED.
       Use standard ED terminology (e.g., "abd pain", "chest pain", "dyspnea",
       "headache", "s/p fall", "laceration", "fever", "n/v", "back pain", etc.)
    2. Pain score - 0 to 10 (0 = no pain, 10 = worst imaginable).
    3. Age - patient's age in years.
    4. Gender - "male" or "female".
    5. Arrival transport - how they got to the ED: "ambulance", "walk_in", or "helicopter".

    IMPORTANT — Vital signs for ambulance/helicopter patients:
    If the patient arrived by AMBULANCE or HELICOPTER, EMS provides vital signs at
    handoff. After confirming arrival_transport is ambulance or helicopter, also ask
    for the following (the patient can say "skip" or "I don't know" for any):
    6. Temperature (Fahrenheit, e.g., 98.6)
    7. Heart rate (bpm, e.g., 80)
    8. Respiratory rate (breaths/min, e.g., 16)
    9. Oxygen saturation (%, e.g., 98)
    10. Blood pressure (systolic/diastolic, e.g., 120/80)
    For walk-in patients, do NOT ask for vitals.

    Past Medical History (ALL patients — walk-in AND ambulance/helicopter):
    Ask the patient about chronic conditions and prior hospital admissions. This
    feeds the v3 triage model's PMH features. Ask both questions even if the
    patient seems uncomplicated — the model handles "no history" gracefully and
    uses these signals for the admission/discharge prediction.
    11. Past medical history / chronic conditions — free-text, comma-separated
        (e.g., "CHF, diabetes, prior stroke" or "CKD on dialysis"). Accept
        "skip", "no", "none", or "I don't know" if the patient has nothing to
        report. Pass the patient's wording through verbatim — the tool parses
        it against a clinical vocabulary at inference.
    12. Approximate number of prior hospital admissions — an integer (0 is a
        valid answer meaning "never admitted before"). Use -1 if the patient
        skips or doesn't know.

    After gathering everything, respond ONLY with valid JSON.
    For walk-in patients:
    {{
      "subject_id": -1,
      "chief_complaints": ["complaint1", "complaint2"],
      "pain_score": 5,
      "age": 45,
      "gender": "male",
      "arrival_transport": "walk_in",
      "prior_history": "diabetes, prior MI",
      "n_prior_admissions": 2
    }}
    For ambulance/helicopter patients (include vitals, use -1 for any unknown):
    {{
      "subject_id": 17287581,
      "chief_complaints": ["complaint1", "complaint2"],
      "pain_score": 7,
      "age": 68,
      "gender": "female",
      "arrival_transport": "ambulance",
      "temperature": 101.2,
      "heartrate": 110,
      "resprate": 22,
      "o2sat": 94,
      "sbp": 85,
      "dbp": 55,
      "prior_history": "CHF, hypertension, COPD",
      "n_prior_admissions": 4
    }}
    Use "subject_id": -1 for any patient who is new, declines, or doesn't know
    their MRN. For patients with no prior history (or who skipped the questions):
    use "prior_history": "" and "n_prior_admissions": -1.
  expected_output: >
    A JSON object with all required fields filled in. Includes `subject_id`
    (integer MRN, -1 if new/unknown). For ambulance/helicopter patients,
    includes vital sign fields (use -1 for unknown). All patients include
    `prior_history` (string, "" if skipped) and `n_prior_admissions`
    (integer, -1 if skipped). No additional text, only valid JSON.
  agent: nlp_parser

triage_assessment_task:
  description: >
    Using the structured patient data from the previous task, perform triage:

    1. Parse the JSON from the previous task to get all fields

    1b. EHR history lookup (returning patients only). Read `subject_id` from the
       parsed JSON. If it is a POSITIVE integer (the patient gave an MRN), FIRST
       call the **patient_history_lookup_tool** with:
         - subject_id: that integer
         - current_intime: the literal string "now" (a live patient is arriving
           now, so all of their past encounters count as prior)
         - chief_complaints: the current complaints
       If it returns `known_patient: true`, serialize its `pmh_block` object to a
       JSON STRING and pass it to the triage_prediction_tool as `pmh_lookup_json`
       in the next step. This supplies the REAL prior-encounter record (PMH flags
       PLUS the days-since-last-visit / same-complaint numerics a patient can't
       report at the bedside), which OVERRIDES the self-reported `prior_history` /
       `n_prior_admissions`. If `subject_id` is -1 (or absent), or the tool
       returns `known_patient: false`, pass an empty string "" for
       `pmh_lookup_json` and rely on the patient's self-report (unchanged path).

    2. Call the triage_prediction_tool with ALL available fields:
       - chief_complaints (comma-separated string)
       - pain_score (integer)
       - age (integer)
       - gender (string)
       - arrival_transport (string)
       - If the JSON contains vital sign fields (temperature, heartrate, resprate,
         o2sat, sbp, dbp) — these are present for ambulance/helicopter patients —
         pass them as well. Use the values from the JSON directly.
         For walk-in patients these fields will be absent; do not pass them
         (the tool defaults to -1 for missing vitals).
       - PMH inputs (all patients): pass `prior_history` (string — pass "" if
         the JSON has it as null, empty, or absent) and `n_prior_admissions`
         (integer — pass -1 if absent or null). The tool zero-fills to the
         first-time-patient pattern when these are skip-equivalents.
       - `pmh_lookup_json`: the serialized `pmh_block` string from step 1b when
         the EHR lookup returned `known_patient: true`; otherwise pass "". When
         provided, it OVERRIDES the self-reported PMH with the real record.
    3. Based on the tool's output, provide a complete triage assessment:
       - The predicted ESI acuity level (1-5) and what it means
       - The confidence of the prediction
       - **If the tool's output includes an `acuity_softmax` array AND the
         top-2 probabilities are within 0.10 of each other, HEDGE the
         acuity output**: report it as "ESI X-Y" (e.g., "ESI 2-3") with
         both probabilities, and briefly explain that the case sits on
         the boundary between two acuity levels. Otherwise just report
         the single argmax level. This matches real triage practice
         where borderline cases get flagged rather than hard-classified.
       - Whether the patient should be admitted or discharged
       - **For the disposition, report both P(admit) and P(discharge)
         from the tool output (not just the binary verdict), with a
         brief calibration note ("triage v3 disposition is approximately
         calibrated, ROC AUC 0.86"). Downstream tasks read this output
         and the doctor disposition tool will refine it after nurse data.**
       - A brief clinical reasoning explanation
       - If vital signs were provided, note any abnormalities detected by the tool
       - If `prior_history_used.pmh_categories_fired` is non-empty in the tool
         output, briefly note which prior-condition categories were recognized
         (e.g., "Patient's prior CHF and diabetes informed the prediction").
       - If `prior_history_used.used_history_lookup` is true, note that the
         patient's REAL prior-encounter record (via their MRN), including the
         days-since-last-visit numerics a patient can't recall, informed the
         prediction rather than self-report. If
         `prior_history_used.self_report_not_in_record` is non-empty, surface a
         brief reconciliation line (e.g., "Patient also reported COPD, not found
         in the prior record — possible outside-system or new diagnosis"),
         making clear it did NOT change the prediction.
       - Recommended next steps based on the acuity level

    Format your response clearly with sections for ACUITY ASSESSMENT, DISPOSITION,
    and RECOMMENDATIONS.

    IMPORTANT: At the END of your response, you MUST include a structured data block
    so the doctor agent can use it. Format it exactly like this:

    ---STRUCTURED_DATA---
    subject_id: <integer MRN from the parsed JSON, or -1 if new/unknown>
    chief_complaints: <comma-separated complaints from the parsed input>
    pain_score: <integer>
    age: <integer>
    gender: <male or female>
    arrival_transport: <ambulance, walk_in, or helicopter>
    predicted_acuity: <integer 1-5 from the tool output>
    is_admitted: <true or false based on disposition prediction>
    ---END_DATA---
  expected_output: >
    A comprehensive triage assessment report with ESI acuity level, admission/discharge
    prediction, confidence scores, clinical reasoning, and recommended next steps.
    Must end with a ---STRUCTURED_DATA--- block containing all patient parameters
    and triage results for the doctor agent.
  agent: triage_agent
  context:
    - parse_symptoms_task

doctor_assessment_task:
  description: >
    You are the doctor reviewing this patient after triage. This is the INITIAL
    (pre-nurse) assessment. Read the triage assessment from the previous task
    carefully.

    1. Extract the structured data from the ---STRUCTURED_DATA--- block at the
       end of the triage assessment. Parse each field.
    2. Determine if the patient is admitted (is_admitted = true) or not, based
       on the triage prediction. (The doctor_disposition_task downstream may
       refine this verdict using nurse data — note that explicitly in your
       output so the patient/clinician knows this is a preliminary screen.)

    IF THE PATIENT IS ADMITTED (per triage):
      Call the **doctor_prediction_tool_v3_base** with these parameters:
        - chief_complaints (comma-separated string)
        - pain_score (integer)
        - age (integer)
        - gender (string)
        - arrival_transport (string)
        - predicted_acuity (integer 1-5)
        - is_admitted (true)
      Then provide a comprehensive INITIAL doctor assessment:
        - **The predicted diagnosis category WITH explicit top-3 alternatives
          and their probabilities** (e.g., "Most likely: Circulatory (47.3%);
          alternatives: Respiratory (22.1%), Digestive (15.4%)"). Pull these
          from the tool's `diagnosis_prediction.top_3_categories` array.
        - **The recommended hospital department WITH explicit top-3
          alternatives and their probabilities** (e.g., "Recommended: CMED
          (39.8%); alternatives: MED (28.1%), SURG (12.6%)"). Pull these
          from the tool's `department_prediction.top_3_departments` array.
          Use the human-readable `name` field, not just the code.
        - Confidence levels for each top prediction.
        - Clinical reasoning connecting the complaints to the diagnosis.
        - Note that this is a PRELIMINARY assessment based on triage data
          only. The disposition task and v3-nurse reassessment will refine
          it once vital signs, medication, and PMH data are collected.
        - Note explicitly that the model uses a 13-class label space (the
          "Symptoms, Signs, Ill-Defined" catch-all is excluded vs the older
          v1/v2 models).

    IF THE PATIENT IS NOT ADMITTED (DISCHARGE, per triage):
      Do NOT call the tool. Instead provide:
        - A brief summary confirming the discharge recommendation.
        - Possible outpatient diagnoses to investigate.
        - Follow-up recommendations (when to return, what to watch for).
        - Note that the doctor_disposition_task downstream will still run
          with nurse data and may upgrade the disposition to admit if
          warranted.

    Format your response with clear sections: INITIAL DIAGNOSIS (top-3 with
    probabilities), DEPARTMENT ASSIGNMENT (top-3 with probabilities, if
    admitted), CLINICAL REASONING, and NEXT STEPS.

    IMPORTANT: At the END of your response, include the structured data block
    so the nurse and enhanced assessment can use it:

    ---STRUCTURED_DATA---
    subject_id: <integer MRN carried over from the triage block, or -1>
    chief_complaints: <comma-separated complaints>
    pain_score: <integer>
    age: <integer>
    gender: <male or female>
    arrival_transport: <ambulance, walk_in, or helicopter>
    predicted_acuity: <integer 1-5>
    is_admitted: <true or false>
    ---END_DATA---
  expected_output: >
    A comprehensive initial doctor assessment. For admitted patients: diagnosis
    category, department assignment, confidence scores, clinical reasoning.
    For discharged patients: discharge summary with follow-up instructions.
    Must end with a ---STRUCTURED_DATA--- block.
  agent: doctor_agent
  context:
    - triage_assessment_task

nurse_data_collection_task:
  description: >
    The doctor has completed their initial assessment. Now collect vital signs,
    cardiac rhythm, medication history, and past medical history from the
    patient to provide additional clinical data.

    Call the nurse_data_collection tool with a brief patient context string
    summarizing the chief complaints and triage results from prior assessments.

    After collecting the data, present a clear summary of what was collected:
    - List each vital sign value (or note which were unavailable)
    - Note the cardiac rhythm if reported (e.g. sinus, atrial fibrillation, paced)
    - List the medications reported (or note if none/unknown)
    - Note the past medical history / chronic conditions reported (or "no
      history" if the patient declined or has none)
    - Note the approximate number of prior hospital admissions if reported
    - Flag any concerning vital sign values or non-sinus rhythm

    Include the FULL JSON output from the tool in your response so the doctor
    can parse it for the enhanced assessment. The JSON contains `rhythm`,
    `prior_history`, `n_prior_admissions`, and `vital_trajectory` (the full
    chronological series — one or more reading sets, ordered by timestamp when
    provided) in addition to
    `vital_signs` and `medications_raw`; the v2 doctor tool ignores the
    extras, the v3 doctor + disposition tools consume them. Preserve the
    `vital_trajectory` object verbatim so the doctor can forward it.
  expected_output: >
    A summary of collected vital signs, cardiac rhythm, medications, and
    past medical history, plus the full JSON output from the
    nurse_data_collection tool for the doctor to use.
  agent: nurse_agent
  context:
    - triage_assessment_task
    - doctor_assessment_task

doctor_disposition_task:
  description: >
    You are the doctor running the REFINED admit/discharge prediction using
    all data collected so far: triage features + the nurse's vital signs,
    cardiac rhythm, medications, and past medical history. This task
    REFINES the triage-time disposition; its verdict becomes the
    authoritative admit/discharge decision for the diagnosis/department
    reassessment task that follows.

    1. Extract the structured data from the ---STRUCTURED_DATA--- block in
       the initial doctor assessment (subject_id, chief_complaints, pain_score,
       age, gender, arrival_transport, predicted_acuity, is_admitted). Treat
       `is_admitted` from triage as `triage_is_admitted` — it's the
       SCREENING verdict that this task may override.

    2. Extract vital signs, medications, rhythm, and PMH from the nurse's
       data collection JSON:
       - temperature, heartrate, resprate, o2sat, sbp, dbp (use -1.0 if
         null/missing — the tool handles fallback to population medians)
       - rhythm (cardiac rhythm string, or "" if not provided)
       - medications_raw (raw medication text, or "unknown")
       - prior_history (free-text chronic conditions, or "")
       - n_prior_admissions (integer, or -1 if not collected)
       - vital_trajectory: if the nurse JSON contains a non-empty
         `vital_trajectory` object (multiple readings per vital, e.g.
         {{"heartrate": [88, 105, 112]}}), serialize it to a JSON STRING and
         pass it as `vital_trajectory_json`. This lets the model use real
         vital TRENDS (min/max/last/delta) instead of a single snapshot and
         materially improves the admit/discharge prediction. If the block is
         absent or empty, pass an empty string "".

    2b. EHR history lookup (returning patients only). Read `subject_id` from the
        structured data block. If it is a POSITIVE integer (the patient gave an
        MRN), FIRST call the **patient_history_lookup_tool** with:
          - subject_id: that integer
          - current_intime: the literal string "now" (a live patient is arriving
            now, so all of their past encounters count as prior)
          - chief_complaints: the current complaints
        If it returns `known_patient: true`, serialize its `pmh_block` object to
        a JSON STRING and pass it to the disposition tool as `pmh_lookup_json` —
        this supplies the REAL prior-encounter record (PMH flags + the
        days-since-last-visit / same-complaint numerics a patient can't report
        at the bedside), which OVERRIDES the self-reported prior_history /
        n_prior_admissions. ALSO, if the lookup's `med_block` is non-null,
        serialize it to a JSON STRING and pass it as `med_lookup_json` — the
        patient's reconciled home-med list from their most recent prior visit,
        which OVERRIDES the self-reported medications. If subject_id is -1 (or
        absent), or the tool returns `known_patient: false`, pass an empty
        string "" for BOTH `pmh_lookup_json` and `med_lookup_json` and rely on
        the patient's self-report.

    3. Call the **doctor_disposition_tool** with ALL of the above (including
       `pmh_lookup_json` from step 2b when available). ALWAYS call this tool —
       both for triage-admit and triage-discharge cases. The model was trained
       on the full 425K stays (admit + discharge in their real-world ratio),
       so it can both confirm an admit and flip a triage-discharge to admit
       when warranted.

    4. From the tool output, extract:
       - `disposition_prediction.is_admitted` (bool — the REFINED verdict)
       - `disposition_prediction.p_admit` and `p_discharge` (calibrated)
       - `triage_v3_baseline.doctor_overrode_triage` and `override_direction`
         (flag whether this task flipped triage's verdict, and which way)
       - `reasoning` array (concise bullets from top contributing signals)

    5. Produce a comprehensive disposition refinement report:
       - **DISPOSITION:** the binary decision (ADMIT / DISCHARGE).
       - **Calibrated probabilities:** report both P(admit) and P(discharge)
         with the explicit calibration note from the tool (ECE 0.0036 on
         the held-out test set — these probabilities are reliable, a
         reading of P(admit)=0.82 means ~82% of historically-similar
         patients were admitted).
       - **Comparison with triage:** if `doctor_overrode_triage` is true,
         say so explicitly and explain the override direction.
         Otherwise note "confirms triage disposition" or similar.
       - **Clinical reasoning:** list the `reasoning` bullets from the
         tool plus any additional inference (PMH categories that fired,
         abnormal vital signs, non-sinus rhythm, polypharmacy, etc.). If
         `nurse_data_used.self_report_not_in_record` is non-empty, add a brief
         reconciliation line noting the patient reported condition(s) not found
         in their prior record (possible outside-system or new diagnosis) — the
         real record still drove the prediction.
       - **Operating point note:** the model uses a 0.40 admit threshold
         (tuned from 0.50 to reduce under-triage — missed admissions are the
         costlier error in an ED); mention this so the threshold choice is
         transparent. Read the actual value from the tool's
         `disposition_prediction.decision_threshold` field rather than
         hard-coding it.

    IMPORTANT: At the END of your response, you MUST include the updated
    structured data block so the reassessment task uses THIS task's
    refined is_admitted, NOT the triage one:

    ---STRUCTURED_DATA---
    subject_id: <integer MRN carried over, or -1>
    chief_complaints: <comma-separated complaints>
    pain_score: <integer>
    age: <integer>
    gender: <male or female>
    arrival_transport: <ambulance, walk_in, or helicopter>
    predicted_acuity: <integer 1-5>
    is_admitted: <true or false — THE REFINED VERDICT from this tool>
    triage_was_admit: <true or false — what triage originally said>
    p_admit: <float 0-1 — for the reassessment task to display>
    ---END_DATA---
  expected_output: >
    A disposition refinement report with the binary decision, calibrated
    P(admit) / P(discharge), explicit comparison against the triage verdict
    (confirmed or overridden + direction), clinical reasoning, and an
    operating-point note. Must end with a ---STRUCTURED_DATA--- block where
    `is_admitted` reflects the REFINED verdict.
  agent: doctor_agent
  context:
    - triage_assessment_task
    - doctor_assessment_task
    - nurse_data_collection_task

doctor_reassessment_task:
  description: >
    You are the doctor performing the ENHANCED diagnosis + department
    reassessment using the nurse's data. Reads the REFINED disposition
    from doctor_disposition_task and gates on THAT, not on the triage
    verdict.

    1. Extract the structured data from the ---STRUCTURED_DATA--- block at
       the end of doctor_disposition_task (the REFINED block — chief
       complaints, pain, age, gender, arrival, predicted_acuity, and
       importantly `is_admitted` from THIS task, not triage). The block
       also includes `triage_was_admit` and `p_admit` for the comparison
       report.

    2. Extract vital signs, rhythm, medications, and PMH from the nurse's
       data collection JSON (same fields as the disposition task used):
       - temperature, heartrate, resprate, o2sat, sbp, dbp (use -1.0 for missing)
       - rhythm
       - medications_raw
       - prior_history
       - n_prior_admissions

    3. IF THE REFINED is_admitted IS TRUE (regardless of what triage said):
       Call the **doctor_prediction_tool_v3** with ALL available data:
         - chief_complaints, pain_score, age, gender, arrival_transport
         - predicted_acuity, is_admitted (the REFINED value)
         - temperature, heartrate, resprate, o2sat, sbp, dbp
         - rhythm
         - medications_raw
         - prior_history
         - n_prior_admissions
         - vital_trajectory_json: same as the disposition task — if the nurse
           JSON has a non-empty `vital_trajectory` object, serialize it to a
           JSON string and pass it so the diagnosis/department models also use
           real vital trends; otherwise pass "".
         - pmh_lookup_json: if you obtained a `pmh_block` from
           patient_history_lookup_tool in the disposition step (returning
           patient with an MRN), pass that same JSON string here so the
           diagnosis/department models also use the real prior-encounter
           record; otherwise pass "".
         - med_lookup_json: likewise, if the lookup returned a non-null
           `med_block`, pass that same JSON string here so the diagnosis/
           department models use the patient's real prior reconciled home-med
           list instead of self-report; otherwise pass "".

       Then provide an enhanced assessment that includes:
         - **Updated diagnosis WITH explicit top-3 + probabilities** from
           the tool's `diagnosis_prediction.top_3_categories` array
           (e.g., "Most likely: Circulatory (52.1%); alternatives:
           Respiratory (18.7%), Digestive (11.4%)").
         - **Updated department WITH explicit top-3 + probabilities** from
           the tool's `department_prediction.top_3_departments` array.
           Include the human-readable `name` field for each.
         - Comparison with the initial v3_base assessment: what changed and
           why (was diagnosis/department altered by nurse data? was the
           confidence higher or lower? did the top-3 reshuffle?).
         - **Comparison with the disposition refinement:** if
           `triage_was_admit` differs from the refined `is_admitted`,
           explicitly call out that the disposition flipped and how the
           full diagnosis/department workup was triggered (or skipped) as
           a result.
         - How the vital signs, medications, rhythm, and PMH influenced
           the prediction. Pull from the tool's `nurse_data_used` block. If
           `nurse_data_used.self_report_not_in_record` is non-empty, note the
           self-reported condition(s) missing from the prior record (the record
           still drove the prediction).
         - Final clinical reasoning and recommendations.

    4. IF THE REFINED is_admitted IS FALSE (regardless of what triage said):
       Do NOT call the diagnosis/department tool. Instead:
       - Confirm the discharge recommendation from the disposition task.
       - If the disposition task overrode triage's admit to discharge,
         explain the clinical rationale (P(admit) fell below the tool's
         decision threshold — see `disposition_prediction.decision_threshold`).
       - Suggest outpatient diagnoses to investigate based on the
         complaint pattern.
       - Provide follow-up recommendations (when to return, what to
         watch for, red-flag symptoms).
       - Note any abnormal vital signs from the nurse data that should
         be acted on before discharge even though the overall prediction
         is discharge.

    Format your response with: ENHANCED DIAGNOSIS (top-3 + probabilities,
    if admitted), DEPARTMENT ASSIGNMENT (top-3 + probabilities, if
    admitted), COMPARISON WITH INITIAL ASSESSMENT, COMPARISON WITH
    DISPOSITION REFINEMENT, VITAL SIGNS / MEDS / PMH IMPACT, and FINAL
    RECOMMENDATIONS.
  expected_output: >
    An enhanced doctor assessment. For admitted patients (REFINED admit):
    top-3 diagnoses with probabilities, top-3 departments with probabilities,
    explicit comparison with the v3_base initial assessment and the
    disposition refinement, vitals/meds/PMH impact analysis, and clinical
    reasoning. For discharged patients (REFINED discharge): discharge
    confirmation with follow-up instructions, calling out any triage
    override and the rationale.
  agent: doctor_agent
  context:
    - triage_assessment_task
    - doctor_assessment_task
    - nurse_data_collection_task
    - doctor_disposition_task
