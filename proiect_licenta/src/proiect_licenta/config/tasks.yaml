parse_symptoms_task:
  description: >
    Analyze the patient's message: "{user_message}".
    
    Extract the following information:
    1. Chief complaints as a list using standard Emergency Department terminology.
       Common terms: abd pain, chest pain, headache, dyspnea, back pain, fever, 
       dizziness, n/v, laceration, s/p fall, altered mental status, weakness, 
       cough, syncope, flank pain, etc.
    2. Pain score from 0-10 based on the patient's description.
       If explicitly stated, use that value. Otherwise, infer from context.
       If truly unknown, use -1.
    3. Age (integer). If not mentioned, use -1.
    4. Gender ("male", "female", or "unknown").
    5. Arrival transport ("ambulance", "walk_in", "helicopter", or "unknown").
    
    You MUST respond ONLY with valid JSON in this exact format, nothing else:
    {{
      "chief_complaints": ["complaint1", "complaint2"],
      "pain_score": 5,
      "age": 45,
      "gender": "male",
      "arrival_transport": "unknown"
    }}
  expected_output: >
    A JSON object with "chief_complaints" (list of strings), "pain_score" (int 0-10 or -1),
    "age" (int or -1), "gender" (string), and "arrival_transport" (string).
    No additional text, only valid JSON.
  agent: nlp_parser

triage_assessment_task:
  description: >
    Using the structured patient data from the previous task, perform triage:
    
    1. Parse the JSON from the previous task to get all fields
    2. Call the triage_prediction_tool with ALL available fields:
       - chief_complaints (comma-separated string)
       - pain_score (integer)
       - age (integer, use 50 if -1 or unknown)
       - gender (string)
       - arrival_transport (string)
    3. Based on the tool's output, provide a complete triage assessment:
       - The predicted ESI acuity level (1-5) and what it means
       - The confidence of the prediction  
       - Whether the patient should be admitted or discharged
       - A brief clinical reasoning explanation
       - Recommended next steps based on the acuity level
    
    Format your response clearly with sections for ACUITY ASSESSMENT, DISPOSITION, 
    and RECOMMENDATIONS.
  expected_output: >
    A comprehensive triage assessment report with ESI acuity level, admission/discharge 
    prediction, confidence scores, clinical reasoning, and recommended next steps.
  agent: triage_agent
  context:
    - parse_symptoms_task
